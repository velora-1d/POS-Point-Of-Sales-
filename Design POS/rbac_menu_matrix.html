
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:4px 12px;border-radius:999px;font-size:12px;cursor:pointer;border:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);transition:all .15s}
.filter-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;background:var(--color-background-secondary);font-weight:500;padding:8px 6px;text-align:center;font-size:11px;color:var(--color-text-secondary);border-bottom:1px solid var(--color-border-tertiary);z-index:1}
thead th:first-child{text-align:left;padding-left:8px;width:28px}
thead th:nth-child(2){text-align:left;min-width:180px}
tbody tr{border-bottom:1px solid var(--color-border-tertiary);transition:background .1s}
tbody tr:hover{background:var(--color-background-secondary)}
tbody tr.hidden{display:none}
td{padding:6px 6px;vertical-align:middle}
td:first-child{color:var(--color-text-tertiary);font-size:11px;text-align:center;width:28px}
td:nth-child(2){font-size:12px;color:var(--color-text-primary)}
td.center{text-align:center}
.check{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;font-size:13px}
.check.y{background:var(--color-background-success);color:var(--color-text-success)}
.check.n{opacity:0}
.section-row td{padding:5px 8px;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-secondary);background:var(--color-background-tertiary)}
.badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:500}
.cat-order{background:#E6F1FB;color:#0C447C}
.cat-kitchen{background:#EAF3DE;color:#27500A}
.cat-table{background:#FAEEDA;color:#633806}
.cat-customer{background:#FBEAF0;color:#72243E}
.cat-product{background:#EEEDFE;color:#3C3489}
.cat-promo{background:#FAECE7;color:#712B13}
.cat-staff{background:#E1F5EE;color:#085041}
.cat-online{background:#FCF0D8;color:#633806}
.cat-report{background:#F1EFE8;color:#444441}
.cat-settings{background:#FCEBEB;color:#791F1F}
@media (prefers-color-scheme: dark){
.cat-order{background:#042C53;color:#85B7EB}
.cat-kitchen{background:#173404;color:#C0DD97}
.cat-table{background:#412402;color:#FAC775}
.cat-customer{background:#4B1528;color:#F4C0D1}
.cat-product{background:#26215C;color:#AFA9EC}
.cat-promo{background:#4A1B0C;color:#F0997B}
.cat-staff{background:#04342C;color:#9FE1CB}
.cat-online{background:#412402;color:#FAC775}
.cat-report{background:#2C2C2A;color:#B4B2A9}
.cat-settings{background:#501313;color:#F7C1C1}
}
.summary{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.sum-card{flex:1;min-width:100px;padding:10px 12px;border-radius:8px;border:1px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.sum-role{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
.sum-count{font-size:22px;font-weight:500;color:var(--color-text-primary);line-height:1}
.sum-label{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
</style>
<div class="wrap">
<div class="header-bar">
  <span class="title">Menu & Akses per Role</span>
  <div class="filter-group" id="filters">
    <button class="filter-btn active" data-role="all">Semua</button>
    <button class="filter-btn" data-role="kitchen">🍳 Kitchen</button>
    <button class="filter-btn" data-role="bar">🍹 Bar</button>
    <button class="filter-btn" data-role="kasir">🖨 Kasir</button>
    <button class="filter-btn" data-role="owner">👑 Owner</button>
  </div>
</div>

<table id="menu-table">
<thead>
  <tr>
    <th>#</th>
    <th style="text-align:left">Menu</th>
    <th>Kitchen</th>
    <th>Bar</th>
    <th>Kasir</th>
    <th>Owner</th>
  </tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="summary">
  <div class="sum-card"><div class="sum-role">🍳 Kitchen</div><div class="sum-count" id="cnt-kitchen">0</div><div class="sum-label">menu</div></div>
  <div class="sum-card"><div class="sum-role">🍹 Bar</div><div class="sum-count" id="cnt-bar">0</div><div class="sum-label">menu</div></div>
  <div class="sum-card"><div class="sum-role">🖨 Kasir</div><div class="sum-count" id="cnt-kasir">0</div><div class="sum-label">menu</div></div>
  <div class="sum-card"><div class="sum-role">👑 Owner</div><div class="sum-count" id="cnt-owner">0</div><div class="sum-label">menu</div></div>
</div>
</div>

<script>
const cats = [
  {label:"Order & Transaksi",cls:"cat-order",items:[
    [1,"Buat Order Baru",0,0,1,1],
    [2,"Daftar Order Aktif",1,1,1,1],
    [3,"Detail Order per Meja",1,1,1,1],
    [4,"Edit Order (approval flow)",0,1,1,1],
    [5,"Split Bill / Gabung Bill",0,0,1,1],
    [6,"Pembayaran (cash, QRIS, gateway)",0,0,1,1],
    [7,"Kasbon & Cicilan",0,0,1,1],
    [8,"PO / Down Payment",0,0,1,1],
    [9,"Diskon & Voucher",0,0,1,1],
    [10,"Struk (print / WA / skip)",0,0,1,1],
    [11,"Riwayat Transaksi",0,0,1,1],
    [12,"Reservasi / Book Meja",0,0,1,1],
  ]},
  {label:"Kitchen Display",cls:"cat-kitchen",items:[
    [13,"Antrian Order Real-time",1,1,0,1],
    [14,"Update Status Masak",1,0,0,0],
    [15,"Approval Order Selesai (kitchen→kasir)",0,1,0,0],
    [16,"Filter Kategori Pesanan",1,1,0,0],
    [17,"Riwayat Order Dapur",1,1,0,1],
    [18,"Estimasi Waktu Masak",1,1,0,1],
  ]},
  {label:"Meja",cls:"cat-table",items:[
    [19,"Layout Meja Visual",1,1,1,1],
    [20,"Status Meja Real-time",1,1,1,1],
    [21,"QR Code per Meja",0,0,1,1],
  ]},
  {label:"Pelanggan",cls:"cat-customer",items:[
    [22,"Customer Database",1,0,1,1],
    [23,"Membership & Loyalty",0,0,1,1],
    [24,"Kasbon per Pelanggan",0,0,1,1],
    [25,"Riwayat Transaksi Pelanggan",0,0,1,1],
  ]},
  {label:"Produk & Stok",cls:"cat-product",items:[
    [26,"Katalog Produk",0,0,0,1],
    [27,"Varian & Multi Harga",0,0,0,1],
    [28,"Manajemen Stok Produk Jadi",0,0,0,1],
    [29,"Inventori Bahan Baku",0,0,0,1],
    [30,"HPP per Produk",0,0,0,1],
    [31,"Reminder Expired Product",0,0,0,1],
    [32,"Alert Stok Menipis",0,0,0,1],
  ]},
  {label:"Promo",cls:"cat-promo",items:[
    [33,"Template Promo",0,0,0,1],
    [34,"Diskon Otomatis",0,0,0,1],
    [35,"Voucher",0,0,0,1],
  ]},
  {label:"Karyawan & Shift",cls:"cat-staff",items:[
    [36,"Data Karyawan",0,0,0,1],
    [37,"Jadwal Shift",0,0,0,1],
    [38,"Absensi Digital",0,0,1,1],
    [39,"Buka / Tutup Shift Kasir",0,0,1,1],
    [40,"Rekap Kas per Shift",0,0,1,1],
    [41,"Laporan Kehadiran",0,0,0,1],
  ]},
  {label:"Order Online",cls:"cat-online",items:[
    [42,"Terima Order GoFood / GrabFood",1,1,1,1],
    [43,"Status Order Online",1,1,1,1],
    [44,"Riwayat Order Online",0,0,1,1],
  ]},
  {label:"Laporan & ERP",cls:"cat-report",items:[
    [45,"Dashboard Keuangan",0,0,0,1],
    [46,"Laporan Penjualan",0,0,0,1],
    [47,"Laporan Per Outlet",0,0,0,1],
    [48,"Laporan Per Kasir",0,0,0,1],
    [49,"Laporan Produk Terlaris",0,0,0,1],
    [50,"Laporan Stok & Inventori",0,0,0,1],
    [51,"Laporan Absensi & Shift",0,0,0,1],
    [52,"Pengeluaran Operasional",0,0,0,1],
    [53,"Export PDF & Excel",0,0,0,1],
  ]},
  {label:"Pengaturan",cls:"cat-settings",items:[
    [54,"Manajemen Outlet & Cabang",0,0,0,1],
    [55,"User & RBAC",0,0,0,1],
    [56,"Konfigurasi Payment Gateway",0,0,0,1],
    [57,"Konfigurasi Printer",0,0,0,1],
    [58,"Konfigurasi QR Meja",0,0,0,1],
    [59,"Notifikasi & Alert",0,0,0,1],
    [60,"Backup & Keamanan Data",0,0,0,1],
    [61,"Approval Rules (threshold nominal)",0,0,0,1],
    [62,"Integrasi GoFood / GrabFood",0,0,0,1],
  ]},
];

const tbody = document.getElementById('tbody');
cats.forEach(cat=>{
  const sr = document.createElement('tr');
  sr.className='section-row';
  sr.innerHTML=`<td></td><td colspan="5"><span class="badge ${cat.cls}">${cat.label}</span></td>`;
  tbody.appendChild(sr);
  cat.items.forEach(([n,name,k,b,c,o])=>{
    const tr=document.createElement('tr');
    tr.dataset.kitchen=k; tr.dataset.bar=b; tr.dataset.kasir=c; tr.dataset.owner=o;
    tr.innerHTML=`<td>${n}</td><td>${name}</td>
    <td class="center"><span class="check ${k?'y':'n'}">${k?'✓':''}</span></td>
    <td class="center"><span class="check ${b?'y':'n'}">${b?'✓':''}</span></td>
    <td class="center"><span class="check ${c?'y':'n'}">${c?'✓':''}</span></td>
    <td class="center"><span class="check ${o?'y':'n'}">${o?'✓':''}</span></td>`;
    tbody.appendChild(tr);
  });
});

function updateCounts(){
  ['kitchen','bar','kasir','owner'].forEach(role=>{
    const rows=[...tbody.querySelectorAll('tr:not(.section-row):not(.hidden)')];
    const n=rows.filter(r=>r.dataset[role]==='1').length;
    document.getElementById('cnt-'+role).textContent=n;
  });
}

let activeRole='all';
document.getElementById('filters').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn'); if(!btn) return;
  activeRole=btn.dataset.role;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b===btn));
  [...tbody.querySelectorAll('tr:not(.section-row)')].forEach(tr=>{
    const show=activeRole==='all'||tr.dataset[activeRole]==='1';
    tr.classList.toggle('hidden',!show);
  });
  [...tbody.querySelectorAll('.section-row')].forEach(sr=>{
    let next=sr.nextSibling;
    let hasVisible=false;
    while(next&&!next.classList.contains('section-row')){
      if(!next.classList.contains('hidden')) hasVisible=true;
      next=next.nextSibling;
    }
    sr.classList.toggle('hidden',!hasVisible);
  });
  updateCounts();
});
updateCounts();
</script>
