<body class="flex min-h-screen text-on-surface">
<!-- Split Screen Layout -->
<div class="flex w-full min-h-screen flex-col md:flex-row">
<!-- Left Side: Brand Content (60%) -->
<div class="hidden md:flex md:w-[60%] bg-gray-50 flex-col p-12 lg:p-24 relative overflow-hidden">
<div class="z-10 flex flex-col h-full justify-between">
<div>
<h1 class="font-display-lg text-[48px] text-primary font-bold mb-4">PosKasir</h1>
<p class="font-body-lg text-gray-800 text-lg max-w-md">Sistem POS terpadu untuk bisnis F&amp;B yang modern.</p>
</div>
<div class="mt-12 flex-grow flex items-center justify-center">
<!-- Placeholder for illustration -->
<div class="w-full max-w-lg aspect-video bg-gray-200 rounded-xl flex items-center justify-center shadow-lg border border-gray-300">
<span class="material-symbols-outlined text-gray-400 text-6xl">storefront</span>
</div>
</div>
<div class="mt-8">
<span class="font-caption text-caption text-gray-600">© 2024 PosKasir. All rights reserved.</span>
</div>
</div>
<!-- Decorative background elements could go here -->
</div>
<!-- Right Side: Login Form (40%) -->
<div class="w-full md:w-[40%] bg-surface-container-lowest flex flex-col justify-center items-center p-8 lg:p-16 relative">
<div class="w-full max-w-md">
<!-- Mobile Logo Header (Hidden on Desktop) -->
<div class="text-center mb-xl md:hidden">
<h1 class="font-display-lg text-display-lg text-primary font-bold">PosKasir</h1>
<p class="font-body-md text-body-md text-gray-600 mt-xs">Terminal Akses</p>
</div>
<div class="mb-8 hidden md:block">
<h2 class="font-display-md text-display-md text-gray-800 font-bold mb-2">Selamat Datang</h2>
<p class="font-body-md text-gray-600">Masuk ke terminal akses Anda.</p>
</div>
<!-- Login Container (No Card Styles) -->
<div class="w-full bg-surface-container-lowest">
<!-- Tabs -->
<div class="flex border-b border-gray-200 mb-6">
<button class="flex-1 py-3 text-center font-label-caps text-label-caps uppercase border-b-2 border-amber-400 text-gray-800 transition-colors" id="tab-email" onclick="switchTab('email')">
                        Email &amp; Password
                    </button>
<button class="flex-1 py-3 text-center font-label-caps text-label-caps uppercase border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors" id="tab-pin" onclick="switchTab('pin')">
                        PIN Cepat
                    </button>
</div>
<!-- Email Content -->
<div id="content-email">
<form class="space-y-md" onsubmit="event.preventDefault();">
<div>
<label class="block font-label-caps text-label-caps text-gray-600 uppercase mb-xs">Email</label>
<input class="w-full px-3 py-2 bg-surface-container-lowest border border-gray-200 rounded-md font-body-md text-body-md text-gray-800 focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-shadow" placeholder="manager@poskasir.com" required="" type="email"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-gray-600 uppercase mb-xs">Password</label>
<div class="relative">
<input class="w-full px-3 py-2 bg-surface-container-lowest border border-gray-200 rounded-md font-body-md text-body-md text-gray-800 focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-shadow pr-10" id="password-input" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-gray-600" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[18px]" id="visibility-icon">visibility</span>
</button>
</div>
</div>
<div class="pt-sm">
<button class="w-full py-3 bg-amber-400 hover:bg-amber-600 text-on-primary rounded-md font-body-md text-body-md font-bold transition-colors" type="submit">
                                Masuk
                            </button>
</div>
</form>
</div>
<!-- PIN Content (Hidden by default) -->
<div class="hidden" id="content-pin">
<div class="flex flex-col items-center">
<p class="font-body-md text-body-md text-gray-600 mb-lg">Masukkan 6 digit PIN Terminal</p>
<!-- PIN Dots -->
<div class="flex gap-sm mb-xl">
<div class="w-3 h-3 rounded-full bg-gray-200" id="pin-1"></div>
<div class="w-3 h-3 rounded-full bg-gray-200" id="pin-2"></div>
<div class="w-3 h-3 rounded-full bg-gray-200" id="pin-3"></div>
<div class="w-3 h-3 rounded-full bg-gray-200" id="pin-4"></div>
<div class="w-3 h-3 rounded-full bg-gray-200" id="pin-5"></div>
<div class="w-3 h-3 rounded-full bg-gray-200" id="pin-6"></div>
</div>
<!-- Numpad -->
<div class="grid grid-cols-3 gap-sm w-full max-w-[240px]">
<button class="py-3 bg-surface-bright hover:bg-surface-container-high border border-gray-200 rounded-md font-price-lg text-price-lg text-gray-800 transition-colors" onclick="addPin('1')">1</button>
<button class="py-3 bg-surface-bright hover:bg-surface-container-high border border-gray-200 rounded-md font-price-lg text-price-lg text-gray-800 transition-colors" onclick="addPin('2')">2</button>
<button class="py-3 bg-surface-bright hover:bg-surface-container-high border border-gray-200 rounded-md font-price-lg text-price-lg text-gray-800 transition-colors" onclick="addPin('3')">3</button>
<button class="py-3 bg-surface-bright hover:bg-surface-container-high border border-gray-200 rounded-md font-price-lg text-price-lg text-gray-800 transition-colors" onclick="addPin('4')">4</button>
<button class="py-3 bg-surface-bright hover:bg-surface-container-high border border-gray-200 rounded-md font-price-lg text-price-lg text-gray-800 transition-colors" onclick="addPin('5')">5</button>
<button class="py-3 bg-surface-bright hover:bg-surface-container-high border border-gray-200 rounded-md font-price-lg text-price-lg text-gray-800 transition-colors" onclick="addPin('6')">6</button>
<button class="py-3 bg-surface-bright hover:bg-surface-container-high border border-gray-200 rounded-md font-price-lg text-price-lg text-gray-800 transition-colors" onclick="addPin('7')">7</button>
<button class="py-3 bg-surface-bright hover:bg-surface-container-high border border-gray-200 rounded-md font-price-lg text-price-lg text-gray-800 transition-colors" onclick="addPin('8')">8</button>
<button class="py-3 bg-surface-bright hover:bg-surface-container-high border border-gray-200 rounded-md font-price-lg text-price-lg text-gray-800 transition-colors" onclick="addPin('9')">9</button>
<div></div>
<button class="py-3 bg-surface-bright hover:bg-surface-container-high border border-gray-200 rounded-md font-price-lg text-price-lg text-gray-800 transition-colors" onclick="addPin('0')">0</button>
<button class="py-3 flex items-center justify-center bg-surface-bright hover:bg-danger-bg hover:text-danger-text hover:border-danger-text border border-gray-200 rounded-md text-gray-600 transition-colors" onclick="removePin()">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
</div>
</div>
</div>
<!-- Mobile Footer -->
<div class="text-center mt-12 md:hidden">
<span class="font-caption text-caption text-gray-400">PosKasir v1.0 • System Secure</span>
</div>
</div>
</div>
</div>
<script>
        let currentPinLength = 0;

        function switchTab(tab) {
            const emailTab = document.getElementById('tab-email');
            const pinTab = document.getElementById('tab-pin');
            const emailContent = document.getElementById('content-email');
            const pinContent = document.getElementById('content-pin');

            if (tab === 'email') {
                emailTab.classList.add('border-amber-400', 'text-gray-800');
                emailTab.classList.remove('border-transparent', 'text-gray-400');
                pinTab.classList.add('border-transparent', 'text-gray-400');
                pinTab.classList.remove('border-amber-400', 'text-gray-800');
                emailContent.classList.remove('hidden');
                pinContent.classList.add('hidden');
            } else {
                pinTab.classList.add('border-amber-400', 'text-gray-800');
                pinTab.classList.remove('border-transparent', 'text-gray-400');
                emailTab.classList.add('border-transparent', 'text-gray-400');
                emailTab.classList.remove('border-amber-400', 'text-gray-800');
                pinContent.classList.remove('hidden');
                emailContent.classList.add('hidden');
            }
        }

        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('visibility-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function addPin(num) {
            if (currentPinLength < 6) {
                currentPinLength++;
                const dot = document.getElementById(`pin-${currentPinLength}`);
                dot.classList.remove('bg-gray-200');
                dot.classList.add('bg-amber-400');
                
                if (currentPinLength === 6) {
                    // Simulate login
                    setTimeout(() => {
                        alert('Login dengan PIN disimulasikan');
                        resetPin();
                    }, 300);
                }
            }
        }

        function removePin() {
            if (currentPinLength > 0) {
                const dot = document.getElementById(`pin-${currentPinLength}`);
                dot.classList.remove('bg-amber-400');
                dot.classList.add('bg-gray-200');
                currentPinLength--;
            }
        }

        function resetPin() {
            for (let i = 1; i <= 6; i++) {
                const dot = document.getElementById(`pin-${i}`);
                dot.classList.remove('bg-amber-400');
                dot.classList.add('bg-gray-200');
            }
            currentPinLength = 0;
        }
    </script>
